name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    name: smoke + schema tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure bash + python3 (runner ships both)
        run: |
          bash --version
          python3 --version

      - name: Install jsonschema (pinned version, hermetic)
        run: |
          # Pinned per Codex 12차 [medium] — 비헤메틱 "latest install" 금지.
          # 의도적 업그레이드 시 이 핀도 PR에서 함께 수정.
          python3 -m pip install --user --quiet 'jsonschema==4.24.0'
          python3 -c "import importlib.metadata as m; print('jsonschema', m.version('jsonschema'))"

      - name: Run smoke tests
        run: bash tests/smoke.sh

      - name: Run schema validation tests
        env:
          TEAM_AGENT_SCHEMA_STRICT: "1"
        run: bash tests/schema-validation.sh
